    <style>
        :root {
            --bg: #0c0f1a; --bg2: #111624; --card: #1a1f2e;

            --accent2: #a78bfa; --accent3: #f472b6; --text: #f1f5f9;
            --muted: #8896a6; --muted2: #6b7a8d; --border: #2a3045;
            --green: #22c55e; --red: #ef4444; --gold: #f59e0b;
            --cyan: #06b6d4; --orange: #fb923c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.7;
        }
        ::selection { background: rgba(59,130,246,0.3); color: #fff; }

        /* Top Bar */
        .topbar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(12,15,26,0.94); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px; display: flex; align-items: center; justify-content: space-between;
            height: 56px;
        }
        .topbar .logo { font-size: 17px; font-weight: 700; letter-spacing: 1px; background: linear-gradient(135deg, var(--accent-light), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .topbar .nav { display: flex; gap: 4px; flex-wrap: wrap; }
        .topbar .nav a { color: var(--muted); text-decoration: none; font-size: 12px; padding: 5px 10px; border-radius: 6px; transition: 0.2s; white-space: nowrap; }
        .topbar .nav a:hover { color: var(--text); background: rgba(255,255,255,0.06); }
        .topbar .live-indicator { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--green); }
        .topbar .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        .container { max-width: 960px; margin: 0 auto; padding: 0 20px 20px; }

        /* Hero */
        .hero { text-align: center; padding: 40px 0 24px; }
        .hero h1 { font-size: 30px; font-weight: 700; margin-bottom: 6px; letter-spacing: 2px; }
        .hero h1 span { background: linear-gradient(135deg, var(--accent-light), var(--accent2), var(--accent3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero .sub { color: var(--muted); font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .hero .sub .badge { padding: 3px 14px; border-radius: 20px; font-size: 11px; }
        .hero .sub .date-badge { background: rgba(59,130,246,0.12); color: var(--accent-light); }
        .hero .sub .status-badge { background: rgba(34,197,94,0.12); color: var(--green); }

        /* Quick Nav */
        .quick-nav { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin: 14px 0 20px; }
        .quick-nav a { padding: 7px 16px; border-radius: 24px; font-size: 12px; text-decoration: none; background: var(--card); color: var(--muted); border: 1px solid var(--border); transition: 0.2s; }
        .quick-nav a:hover { background: var(--card-hover); color: var(--text); border-color: var(--accent); }

        /* Stats */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; transition: 0.25s; }
        .stat-card:hover { border-color: rgba(59,130,246,0.3); transform: translateY(-2px); }
        .stat-card .num { font-size: 24px; font-weight: 700; color: var(--accent-light); }
        .stat-card .label { font-size: 11px; color: var(--muted); margin-top: 2px; }

        /* Section */
        .section { background: var(--card); border-radius: 16px; padding: 22px 24px; margin-bottom: 18px; border: 1px solid var(--border); transition: 0.3s; }
        .section:hover { border-color: rgba(59,130,246,0.2); }
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .section-header .left { display: flex; align-items: center; gap: 8px; }
        .section-header .left h2 { font-size: 16px; font-weight: 600; }
        .section-header .tag { font-size: 11px; padding: 2px 10px; border-radius: 20px; background: rgba(59,130,246,0.12); color: var(--accent-light); }
        .section-header .refresh-btn { font-size: 11px; color: var(--muted2); cursor: pointer; padding: 3px 8px; border-radius: 6px; transition: 0.2s; }
        .section-header .refresh-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .topic-tags { display: flex; gap: 5px; flex-wrap: wrap; margin: -2px 0 14px; }
        .topic-tags span { font-size: 11px; padding: 2px 10px; border-radius: 12px; background: rgba(59,130,246,0.08); color: var(--accent-light); }

        /* News */
        .news-item { padding: 12px 0; border-bottom: 1px solid rgba(42,48,69,0.4); transition: 0.2s; cursor: default; }
        .news-item:last-child { border-bottom: none; }
        .news-item:hover { padding-left: 8px; background: rgba(255,255,255,0.01); border-radius: 8px; }
        .news-item .title { font-size: 14px; font-weight: 500; display: flex; gap: 8px; align-items: flex-start; }
        .news-item .title .idx { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 50%; background: rgba(59,130,246,0.12); color: var(--accent-light); font-size: 10px; font-weight: 600; flex-shrink: 0; margin-top: 3px; }
        .news-item .summary { font-size: 13px; color: var(--muted); margin-left: 26px; margin-top: 2px; }
        .news-item .meta { margin-top: 4px; margin-left: 26px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .news-item .meta .source { font-size: 11px; color: var(--muted2); background: rgba(255,255,255,0.03); padding: 2px 10px; border-radius: 10px; }

        /* Market Grid */
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 8px; }
        .market-item { background: rgba(12,15,26,0.5); border-radius: 10px; padding: 14px 12px; text-align: center; border: 1px solid transparent; transition: 0.2s; }
        .market-item:hover { border-color: var(--border); transform: translateY(-1px); }
        .market-item .name { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
        .market-item .value { font-size: 20px; font-weight: 700; margin: 2px 0; }
        .market-item .change { font-size: 12px; font-weight: 500; }
        .up { color: var(--red); } .down { color: var(--green); } .flat { color: var(--muted); }

        /* FX */
        .fx-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
        .fx-item { background: rgba(12,15,26,0.5); border-radius: 10px; padding: 12px; text-align: center; }
        .fx-item .pair { font-size: 12px; color: var(--muted); }
        .fx-item .rate { font-size: 17px; font-weight: 600; margin: 2px 0; font-family: "SF Mono", "Fira Code", monospace; }
        .fx-item .delta { font-size: 11px; }

        /* Commodity */
        .commodity-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
        .commodity-item { background: rgba(12,15,26,0.5); border-radius: 10px; padding: 12px; text-align: center; }
        .commodity-item .name { font-size: 11px; color: var(--muted); }
        .commodity-item .price { font-size: 15px; font-weight: 600; }

        /* Weather */
        .weather-main { display: flex; align-items: center; gap: 20px; background: rgba(6,182,212,0.05); border-radius: 12px; padding: 16px 20px; margin-bottom: 14px; }
        .weather-main .icon-temp { display: flex; align-items: center; gap: 10px; }
        .weather-main .big-temp { font-size: 34px; font-weight: 700; letter-spacing: -1px; }
        .weather-main .city-label { font-weight: 600; font-size: 14px; }
        .weather-main .desc { color: var(--muted); font-size: 12px; }
        .weather-3day { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .weather-day { background: rgba(12,15,26,0.5); border-radius: 10px; padding: 12px; text-align: center; }
        .weather-day .day-name { font-size: 12px; font-weight: 600; }
        .weather-day .day-icon { font-size: 20px; margin: 3px 0; }
        .weather-day .day-temp { font-size: 14px; font-weight: 600; }
        .weather-day .day-desc { font-size: 11px; color: var(--muted); }
        .highlight-box { background: linear-gradient(135deg, rgba(59,130,246,0.06), rgba(167,139,250,0.06)); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; padding: 14px 18px; margin: 14px 0 0; font-size: 12px; color: var(--muted); }
        .quote-box { background: linear-gradient(135deg, rgba(245,158,11,0.06), rgba(251,146,60,0.06)); border: 1px solid rgba(245,158,11,0.15); border-radius: 12px; padding: 14px 18px; text-align: center; }
        .quote-box .quote-text { font-size: 14px; font-style: italic; color: var(--gold); }
        .quote-box .quote-author { font-size: 11px; color: var(--muted); margin-top: 3px; }

        /* Loading */
        .loading { color: var(--muted2); font-size: 12px; text-align: center; padding: 10px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Crypto specific */
        .crypto-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
        .crypto-item { background: rgba(12,15,26,0.5); border-radius: 10px; padding: 12px; text-align: center; border: 1px solid transparent; transition: 0.2s; }
        .crypto-item:hover { border-color: var(--border); }
        .crypto-item .name { font-size: 11px; color: var(--muted); }
        .crypto-item .symbol { font-size: 10px; color: var(--muted2); }
        .crypto-item .price { font-size: 16px; font-weight: 600; margin: 2px 0; }
        .crypto-item .change24h { font-size: 11px; }

        footer { text-align: center; padding: 30px 20px 20px; color: var(--muted2); font-size: 11px; border-top: 1px solid var(--border); margin-top: 10px; }
        footer a { color: var(--accent-light); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        @media (max-width: 600px) {
            .container { padding: 0 10px 10px; }
            .hero h1 { font-size: 22px; }
            .section { padding: 14px 16px; border-radius: 12px; }
            .market-grid { grid-template-columns: repeat(2,1fr); }
            .fx-grid { grid-template-columns: repeat(2,1fr); }
            .crypto-grid { grid-template-columns: repeat(2,1fr); }
            .topbar { padding: 0 10px; }
            .topbar .nav a { font-size: 10px; padding: 4px 6px; }
            .stats-row { grid-template-columns: repeat(2,1fr); }
            .weather-3day { grid-template-columns: repeat(3,1fr); gap: 5px; }
            .weather-main { flex-direction: column; text-align: center; }
        }
    </style>
</head>

// ====== Render ======
function render() {
    let html = "";

    // 1. Static news sections
    for (const sec of data.sections) {
        html += '<div class="section" id="sec-'+sec.id+'">';
        html += '<div class="section-header"><div class="left"><span style="font-size:18px;">'+sec.icon+'</span><h2>'+sec.title+'</h2></div><span class="tag">'+(sec.items?sec.items.length+'条':'')+'</span></div>';

            html += '<div class="title"><span class="idx">'+(i+1)+'</span>'+item.t+'</div>';
            html += '<div class="summary">'+item.s+'</div>';
            html += '<div class="meta"><span class="source">📌 '+item.src+'</span><span style="font-size:10px;color:var(--accent-light);">🔗 查看原文</span></div>';
            html += '</div>';
        }
        html += '</div>';
    }

    // 2. Market Section — static fallback + background live update
    html += '<div class="section" id="sec-market"><div class="section-header"><div class="left"><span style="font-size:18px;">📊</span><h2>全球股市 <span class="tag" style="background:rgba(34,197,94,0.12);color:var(--green);font-size:10px;">今日已更新</span></h2></div></div><div class="market-grid" id="marketGrid">'+
      '<div class="market-item"><div class="name">沪指</div><div class="value">3304</div><div class="change up">+0.2%</div></div>'+
      '<div class="market-item"><div class="name">深指</div><div class="value">10786</div><div class="change down">-0.1%</div></div>'+
      '<div class="market-item"><div class="name">恒指</div><div class="value">18235</div><div class="change down">-0.4%</div></div>'+
      '<div class="market-item"><div class="name">道指</div><div class="value">--</div><div class="change flat">周末休市</div></div>'+
      '<div class="market-item"><div class="name">纳指</div><div class="value">--</div><div class="change flat">周末休市</div></div>'+
      '<div class="market-item"><div class="name">标普500</div><div class="value">--</div><div class="change flat">周末休市</div></div>'+
    '</div></div>';

    // 3. Crypto — static fallback + background refresh
    html += '<div class="section" id="sec-crypto"><div class="section-header"><div class="left"><span style="font-size:18px;">₿</span><h2>加密货币 · 实时 <span class="tag" style="background:rgba(6,182,212,0.12);color:var(--cyan);font-size:10px;">自动刷新</span></h2></div><span class="refresh-btn" onclick="loadCrypto()">🔄</span></div><div class="crypto-grid" id="cryptoGrid"></div>'+
      '<div style="margin-top:10px;font-size:11px;color:var(--muted2);text-align:center;">数据由 CoinGecko 提供 · 每60秒自动刷新</div></div>';

    // 4. Forex — static fallback + background refresh
    html += '<div class="section" id="sec-forex"><div class="section-header"><div class="left"><span style="font-size:18px;">💱</span><h2>外汇汇率 · 实时 <span class="tag" style="background:rgba(6,182,212,0.12);color:var(--cyan);font-size:10px;">自动刷新</span></h2></div><span class="refresh-btn" onclick="loadForex()">🔄</span></div><div class="fx-grid" id="fxGrid"></div>'+
      '<div style="margin-top:10px;font-size:11px;color:var(--muted2);text-align:center;">数据由 ExchangeRate-API 提供</div></div>';

    // 5. Weather
    const w = data.weather;
    html += '<div class="section" id="sec-weather"><div class="section-header"><div class="left"><span style="font-size:18px;">🌤️</span><h2>天气预报 · '+w.city+'</h2></div></div>';
    html += '<div class="weather-main"><div class="icon-temp"><span style="font-size:42px;">'+w.current.icon+'</span><span class="big-temp">'+w.current.temp+'</span></div><div><div class="city-label">'+w.city+' · '+w.current.desc+'</div><div class="desc">东南风6km/h·湿度91%·体感偏凉</div></div></div>';
    html += '<div class="weather-3day">';
    for (const f of w.forecast) html += '<div class="weather-day"><div class="day-name">'+f.day+'</div><div class="day-icon">'+f.icon+'</div><div class="day-temp">'+f.temp+'</div><div class="day-desc">'+f.desc+'</div></div>';
    html += '</div><div class="highlight-box">💡 泗阳今天有小雨带伞，后天(5/4)大晴天最高25°C适合出游</div></div>';

    // 6. Quote
    html += '<div class="section"><div class="quote-box"><div class="quote-text">"'+data.quote.text+'"</div><div class="quote-author">'+data.quote.author+'</div></div></div>';

    document.getElementById("newsContent").innerHTML = html;

    // Load live data silently in background (no spinners)
    loadCrypto();
    loadForex();
    setTimeout(() => { document.getElementById("liveStatus").textContent = "✅ 今日已更新"; }, 100);
}

// ====== Crypto ======
async function loadCrypto() {
    try {
        const ids = cryptoIds.map(c => c.id).join(",");
        const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids='+ids+'&vs_currencies=usd&include_24hr_change=true');
        if (res.ok) {
            const json = await res.json();
            let h = "";
            for (const c of cryptoIds) {
                const d = json[c.id];
                if (d) {
                    const chg = d.usd_24h_change || 0;
                    const cls = chg > 0 ? "up" : (chg < 0 ? "down" : "flat");
                    h += '<div class="crypto-item"><div class="name">'+c.icon+' '+c.name+' <span class="symbol">'+c.id.toUpperCase()+'</span></div><div class="price">$'+d.usd.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})+'</div><div class="change24h '+cls+'">24h: '+(chg>0?'+':'')+chg.toFixed(2)+'%</div></div>';
                }
            }
            const el = document.getElementById("cryptoGrid");
            if (el) el.innerHTML = h;
        }
    } catch(e) {}
}

// ====== Forex ======
async function loadForex() {
    const el = document.getElementById("fxGrid");
    if (!el) return;
    try {
        const baseRes = await fetch('https://api.exchangerate-api.com/v4/latest/CNY');
        if (baseRes.ok) {
            const data = await baseRes.json();
            const rates = data.rates;
            let h = "";
            for (const f of fxPairs) {
                if (f.from && f.to && rates[f.from]) {
                    // For pairs ending with CNY: show how much foreign = 1 CNY
                    let rate, delta, dCls;
                    if (f.to === "CNY") {
                        rate = (1 / rates[f.from]).toFixed(4);
                        delta = "--";
                        dCls = "flat";
                    }
                    h += '<div class="fx-item"><div class="pair">'+f.pair+'</div><div class="rate">'+rate+'</div><div class="delta '+dCls+'">'+delta+'</div></div>';
                } else {
                    h += '<div class="fx-item"><div class="pair">'+f.pair+'</div><div class="rate">--</div><div class="delta flat">--</div></div>';
                }
            }
            el.innerHTML = h;
        }
    } catch(e) {}
}

// ====== Scroll ======
function scrollToSection(id) {
    const el = document.getElementById('sec-'+id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ====== Init ======
render();

// Auto refresh every 60s
setInterval(() => { loadCrypto(); }, 60000);
</script>
