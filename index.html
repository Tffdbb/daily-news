            --accent: #3b82f6;
            --accent-light: #60a5fa;
            --accent2: #a78bfa;
            --accent3: #f472b6;
            --text: #f1f5f9;
            --muted: #8896a6;
            --muted2: #6b7a8d;
            --border: #2a3045;
            --green: #22c55e;
            --red: #ef4444;
            --gold: #f59e0b;
            --cyan: #06b6d4;
            --orange: #fb923c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            scroll-behavior: smooth;
        }
        ::selection { background: rgba(59,130,246,0.3); color: #fff; }

        /* Top Bar */
        .topbar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(12,15,26,0.94);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex; align-items: center; justify-content: space-between;
            height: 58px;
        }
        .topbar .logo {
            font-size: 18px; font-weight: 700; letter-spacing: 1px;
            background: linear-gradient(135deg, var(--accent-light), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .topbar .nav { display: flex; gap: 4px; flex-wrap: wrap; }
        .topbar .nav a {

        }
        .topbar .nav a:hover { color: var(--text); background: rgba(255,255,255,0.06); }

        .container { max-width: 960px; margin: 0 auto; padding: 0 20px 20px; }

        /* Hero */
        .hero {
            text-align: center;
            padding: 48px 0 32px;
        }
        .hero h1 { font-size: 34px; font-weight: 700; margin-bottom: 8px; letter-spacing: 2px; }
        .hero h1 span {
            background: linear-gradient(135deg, var(--accent-light), var(--accent2), var(--accent3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero .sub {
            color: var(--muted); font-size: 14px;
            display: flex; align-items: center; justify-content: center; gap: 14px; flex-wrap: wrap;
        }
        .hero .sub .badge {
            padding: 4px 16px; border-radius: 20px; font-size: 12px;
        }
        .hero .sub .date-badge { background: rgba(59,130,246,0.12); color: var(--accent-light); }
        .hero .sub .status-badge { background: rgba(34,197,94,0.12); color: var(--green); }

        /* Quick Nav */
        .quick-nav {
            display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 16px 0 24px;
        }
        .quick-nav a {
            padding: 8px 18px; border-radius: 24px; font-size: 13px; text-decoration: none;
            background: var(--card); color: var(--muted); border: 1px solid var(--border);
            transition: all 0.2s;
        }
        .quick-nav a:hover { background: var(--card-hover); color: var(--text); border-color: var(--accent); }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 16px;
            text-align: center;
            transition: all 0.25s;
            position: relative; overflow: hidden;
        }
        .stat-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            opacity: 0; transition: 0.3s;
        }
        .stat-card:hover { border-color: rgba(59,130,246,0.3); transform: translateY(-2px); }
        .stat-card:hover::before { opacity: 1; }
        .stat-card .num { font-size: 26px; font-weight: 700; color: var(--accent-light); }
        .stat-card .label { font-size: 12px; color: var(--muted); margin-top: 3px; }

        /* Sections */
        .section {
            background: var(--card);
            border-radius: 18px;
            padding: 24px 26px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }
        .section:hover { border-color: rgba(59,130,246,0.2); }
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px; padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .section-header .left { display: flex; align-items: center; gap: 10px; }
        .section-header .left h2 { font-size: 17px; font-weight: 600; }
        .section-header .meta { display: flex; align-items: center; gap: 8px; }
        .section-header .tag {
            font-size: 11px; padding: 2px 10px; border-radius: 20px;
            background: rgba(59,130,246,0.12); color: var(--accent-light);
        }

        /* Topic Tags */
        .topic-tags {
            display: flex; gap: 6px; flex-wrap: wrap; margin: -4px 0 16px;
        }
        .topic-tags span {
            font-size: 11px; padding: 3px 12px; border-radius: 12px;
            background: rgba(59,130,246,0.08); color: var(--accent-light);
        }

        /* News Items */
        .news-item {
            padding: 14px 0;
            border-bottom: 1px solid rgba(42,48,69,0.4);
            transition: all 0.2s;
            cursor: default;
        }
        .news-item:last-child { border-bottom: none; }
        .news-item:hover { padding-left: 10px; background: rgba(255,255,255,0.015); border-radius: 8px; padding-right: 10px; }
        .news-item .title {
            font-size: 15px; font-weight: 500;
            display: flex; gap: 10px; align-items: flex-start;
        }
        .news-item .title .idx {
            display: inline-flex; align-items: center; justify-content: center;
            width: 20px; height: 20px; border-radius: 50%;
            background: rgba(59,130,246,0.12); color: var(--accent-light);
            font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 3px;
        }
        .news-item .summary { font-size: 13px; color: var(--muted); margin-left: 30px; margin-top: 3px; }
        .news-item .meta {
            margin-top: 6px; margin-left: 30px;
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        }
        .news-item .meta .source {
            font-size: 11px; color: var(--muted2);
            background: rgba(255,255,255,0.03); padding: 2px 10px; border-radius: 10px;
        }

        /* Market Grid */
        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin-top: 8px;
        }
        .market-item {
            background: rgba(12,15,26,0.5);
            border-radius: 12px;
            padding: 16px 14px;
            text-align: center;
            border: 1px solid transparent;
            transition: 0.2s;

        .market-item:hover { border-color: var(--border); transform: translateY(-1px); }
        .market-item .name { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
        .market-item .value { font-size: 22px; font-weight: 700; margin: 2px 0; }
        .market-item .change { font-size: 13px; font-weight: 500; }
        .up { color: var(--red); }
        .down { color: var(--green); }
        .flat { color: var(--muted); }

        /* FX Grid */
        .fx-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 8px;
        }
        .fx-item {
            background: rgba(12,15,26,0.5);
            border-radius: 10px;
            padding: 14px;
            text-align: center;

            border-radius: 12px;

            margin-bottom: 16px;

        .weather-main .city-label { font-weight: 600; font-size: 15px; }
        .weather-main .big-temp { font-size: 36px; font-weight: 700; letter-spacing: -1px; }
        .weather-main .desc { color: var(--muted); font-size: 13px; }

        .weather-3day {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .weather-day {
            background: rgba(12,15,26,0.5);
            border-radius: 12px;
            padding: 14px;
            text-align: center;

        .weather-day .day-temp { font-size: 15px; font-weight: 600; }
        .weather-day .day-desc { font-size: 12px; color: var(--muted); }
        .weather-day .day-wind { font-size: 11px; color: var(--muted2); margin-top: 4px; }

        .commodity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 8px;
            margin-top: 8px;
        }
        .commodity-item {
            background: rgba(12,15,26,0.5);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }
        .commodity-item .name { font-size: 12px; color: var(--muted); }
        .commodity-item .price { font-size: 16px; font-weight: 600; }

        /* Highlight Box */
        .highlight-box {
            background: linear-gradient(135deg, rgba(59,130,246,0.06), rgba(167,139,250,0.06));
            border-left: 3px solid var(--accent);
            border-radius: 0 10px 10px 0;
            padding: 16px 20px;
            margin: 16px 0 0;
            font-size: 13px;
            color: var(--muted);

        /* Quote of the day */
        .quote-box {
            background: linear-gradient(135deg, rgba(245,158,11,0.06), rgba(251,146,60,0.06));
            border: 1px solid rgba(245,158,11,0.15);
            border-radius: 12px;
            padding: 16px 20px;
            text-align: center;
        }
        .quote-box .quote-text { font-size: 15px; font-style: italic; color: var(--gold); }
        .quote-box .quote-author { font-size: 12px; color: var(--muted); margin-top: 4px; }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px 30px;
            color: var(--muted2);
            font-size: 12px;
            border-top: 1px solid var(--border);
            margin-top: 10px;
        }
        footer a { color: var(--accent-light); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        @media (max-width: 600px) {
            .container { padding: 0 12px 12px; }
            .hero h1 { font-size: 24px; }
            .section { padding: 16px; border-radius: 14px; }
            .market-grid { grid-template-columns: repeat(2,1fr); }
            .fx-grid { grid-template-columns: repeat(2,1fr); }
            .topbar { padding: 0 12px; }
            .topbar .nav a { font-size: 11px; padding: 4px 6px; }
            .stats-row { grid-template-columns: repeat(2,1fr); }
            .weather-3day { grid-template-columns: repeat(3,1fr); gap: 6px; }
            .weather-main { flex-direction: column; text-align: center; }
            .weather-main .icon-temp { justify-content: center; }
        }
    </style>
</head>

const weekdays = ["日","一","二","三","四","五","六"];
document.getElementById("currentDate").textContent = y+"年"+mo+"月"+d+"日 星期"+weekdays[beijing.getUTCDay()];
document.getElementById("footerDate").textContent = "更新于 " + y + "-" + String(mo).padStart(2,"0") + "-" + String(d).padStart(2,"0") + " " + data.updateTime;

// ===== Stats =====
let statsH = "";
for (const s of data.hotStats) {
    statsH += '<div class="stat-card"><div class="num">'+s.num+'</div><div class="label">'+s.label+'</div></div>';
}
document.getElementById("statsRow").innerHTML = statsH;

// ===== Sections =====
let html = "";
for (let si = 0; si < data.sections.length; si++) {
    const sec = data.sections[si];
    html += '<div class="section" id="sec-'+sec.id+'">';
    html += '<div class="section-header"><div class="left"><span style="font-size:20px;">'+sec.icon+'</span><h2>'+sec.title+'</h2></div><div class="meta"><span class="tag">'+(sec.items ? sec.items.length+'条' : '')+'</span></div></div>';

    if (sec.tags) {
        html += '<div class="topic-tags">';
        for (const tag of sec.tags) html += '<span>#'+tag+'</span>';
        html += '</div>';
    }

    if (sec.note) html += '<p style="color:var(--muted);font-size:13px;margin-bottom:12px;">'+sec.note+'</p>';

    // News items
    if (sec.items) {
        for (let i = 0; i < sec.items.length; i++) {
            const item = sec.items[i];
            html += '<div class="news-item">';
            html += '<div class="title"><span class="idx">'+(i+1)+'</span>'+item.t+'</div>';
            html += '<div class="summary">'+item.s+'</div>';
            html += '<div class="meta"><span class="source">📌 '+item.src+'</span></div>';
            html += '</div>';
        }
    }

    // Markets
    if (sec.markets) {
        html += '<div class="market-grid">';
        for (const m of sec.markets) {
            html += '<div class="market-item"><div class="name">'+m.name+'</div><div class="value">'+m.value+'</div><div class="change '+m.cls+'">'+m.change+'</div></div>';
        }
        html += '</div>';
    }

    // FX
    if (sec.fx) {
        html += '<div style="margin-top:16px;"><p style="font-size:13px;color:var(--muted);margin-bottom:8px;">💱 外汇汇率</p><div class="fx-grid">';
        for (const f of sec.fx) {
            const dCls = f.delta.startsWith("+") ? "up" : (f.delta.startsWith("-") ? "down" : "flat");
            html += '<div class="fx-item"><div class="pair">'+f.pair+'</div><div class="rate">'+f.rate+'</div><div class="delta '+dCls+'">'+f.delta+'</div></div>';
        }
        html += '</div></div>';
    }

    // Commodities
    if (sec.commodities) {
        html += '<div style="margin-top:16px;"><p style="font-size:13px;color:var(--muted);margin-bottom:8px;">🏆 大宗商品 & 加密资产</p><div class="commodity-grid">';
        for (const c of sec.commodities) {
            html += '<div class="commodity-item"><div class="name">'+c.name+'</div><div class="price">'+c.price+'</div></div>';
        }
        html += '</div></div>';
    }

    html += '</div>';
}

// ===== Weather Section (separate) =====
const w = data.weather;
html += '<div class="section" id="sec-weather"><div class="section-header"><div class="left"><span style="font-size:20px;">🌤️</span><h2>天气预报 · '+w.city+'</h2></div></div>';
html += '<div class="weather-main">';
html += '<div class="icon-temp"><span style="font-size:48px;">'+w.current.icon+'</span><span class="big-temp">'+w.current.temp+'</span></div>';
html += '<div><div class="city-label">'+w.city+' · '+w.current.desc+'</div><div class="desc">'+data.sections.find(s=>s.id==="life").items[0].s+'</div></div>';
html += '</div>';
html += '<div class="weather-3day">';
for (const f of w.forecast) {
    html += '<div class="weather-day"><div class="day-name">'+f.day+'</div><div class="day-icon">'+f.icon+'</div><div class="day-temp">'+f.temp+'</div><div class="day-desc">'+f.desc+'</div><div class="day-wind">'+f.wind+'</div></div>';
}
html += '</div>';
html += '<div class="highlight-box">💡 五一假期出行高峰，泗阳今天有小雨记得带伞。后天(5/4)大晴天最高25°C，适合出游！</div>';
html += '</div>';

// ===== Quote =====
html += '<div class="section"><div class="quote-box"><div class="quote-text">"'+data.quote.text+'"</div><div class="quote-author">'+data.quote.author+'</div></div></div>';

document.getElementById("newsContent").innerHTML = html;

// ===== Scroll =====
function scrollToSection(id) {
    const el = document.getElementById('sec-'+id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
