        ::selection { background: rgba(59,130,246,0.3); color: #fff; }

        /* Top Bar */
        .topbar {

            height: 56px;
        }
        .topbar .logo { font-size: 17px; font-weight: 700; letter-spacing: 1px; background: linear-gradient(135deg, var(--accent-light), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .topbar .nav a:hover { color: var(--text); background: rgba(255,255,255,0.06); }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        .container { max-width: 960px; margin: 0 auto; padding: 0 20px 20px; }

        /* Hero */
        .hero { text-align: center; padding: 40px 0 24px; }
        .hero h1 { font-size: 30px; font-weight: 700; margin-bottom: 6px; letter-spacing: 2px; }
        .hero h1 span { background: linear-gradient(135deg, var(--accent-light), var(--accent2), var(--accent3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero .sub { color: var(--muted); font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .hero .sub .badge { padding: 3px 14px; border-radius: 20px; font-size: 11px; }
        .hero .sub .date-badge { background: rgba(59,130,246,0.12); color: var(--accent-light); }
        .hero .sub .status-badge { background: rgba(34,197,94,0.12); color: var(--green); }

        /* Quick Nav */
        .quick-nav { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin: 14px 0 20px; }
        .quick-nav a { padding: 7px 16px; border-radius: 24px; font-size: 12px; text-decoration: none; background: var(--card); color: var(--muted); border: 1px solid var(--border); transition: 0.2s; }
        .quick-nav a:hover { background: var(--card-hover); color: var(--text); border-color: var(--accent); }

        /* Stats */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
        .stat-card:hover { border-color: rgba(59,130,246,0.3); }
        .stat-card .num { font-size: 24px; font-weight: 700; color: var(--accent-light); }
        .stat-card .label { font-size: 11px; color: var(--muted); margin-top: 2px; }

        /* Section */
        .section { background: var(--card); border-radius: 16px; padding: 22px 24px; margin-bottom: 18px; border: 1px solid var(--border); content-visibility: auto; contain-intrinsic-size: 320px; }
        /* perf */
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .section-header .left { display: flex; align-items: center; gap: 8px; }
        .section-header .left h2 { font-size: 16px; font-weight: 600; }
        .section-header .tag { font-size: 11px; padding: 2px 10px; border-radius: 20px; background: rgba(59,130,246,0.12); color: var(--accent-light); }
        .section-header .refresh-btn { font-size: 11px; color: var(--muted2); cursor: pointer; padding: 3px 8px; border-radius: 6px; transition: 0.2s; }
        .section-header .refresh-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .topic-tags { display: flex; gap: 5px; flex-wrap: wrap; margin: -2px 0 14px; }
        .topic-tags span { font-size: 11px; padding: 2px 10px; border-radius: 12px; background: rgba(59,130,246,0.08); color: var(--accent-light); }

        /* News */
        .news-item { padding: 12px 0; border-bottom: 1px solid rgba(42,48,69,0.4); transition: 0.2s; cursor: default; }
        .news-item:last-child { border-bottom: none; }
        .news-item:hover { background: rgba(255,255,255,0.015); border-radius: 8px; }
        .news-item .title { font-size: 14px; font-weight: 500; display: flex; gap: 8px; align-items: flex-start; }
        .news-item .title .idx { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 50%; background: rgba(59,130,246,0.12); color: var(--accent-light); font-size: 10px; font-weight: 600; flex-shrink: 0; margin-top: 3px; }
        .news-item .summary { font-size: 13px; color: var(--muted); margin-left: 26px; margin-top: 2px; }
        .news-item .meta { margin-top: 4px; margin-left: 26px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .news-item .meta .source { font-size: 11px; color: var(--muted2); background: rgba(255,255,255,0.03); padding: 2px 10px; border-radius: 10px; }

        /* Market Grid */
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 8px; }
        .market-item { background: rgba(12,15,26,0.5); border-radius: 10px; padding: 14px 12px; text-align: center; border: 1px solid transparent; transition: 0.2s; }
        .market-item:hover { border-color: var(--border); }
        .market-item .name { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
        .market-item .value { font-size: 20px; font-weight: 700; margin: 2px 0; }
        .market-item .change { font-size: 12px; font-weight: 500; }
        .up { color: var(--red); } .down { color: var(--green); } .flat { color: var(--muted); }

        /* FX */
        .fx-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
        .fx-item { background: rgba(12,15,26,0.5); border-radius: 10px; padding: 12px; text-align: center; }
        .fx-item .pair { font-size: 12px; color: var(--muted); }
        .fx-item .rate { font-size: 17px; font-weight: 600; margin: 2px 0; font-family: "SF Mono", "Fira Code", monospace; }
        .fx-item .delta { font-size: 11px; }

        .commodity-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
        .commodity-item { background: rgba(12,15,26,0.5); border-radius: 10px; padding: 12px; text-align: center; }
        .commodity-item .name { font-size: 11px; color: var(--muted); }
        .commodity-item .price { font-size: 15px; font-weight: 600; }

        .weather-main .big-temp { font-size: 34px; font-weight: 700; letter-spacing: -1px; }
        .weather-main .city-label { font-weight: 600; font-size: 14px; }
        .weather-main .desc { color: var(--muted); font-size: 12px; }
        .weather-3day { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .weather-day { background: rgba(12,15,26,0.5); border-radius: 10px; padding: 12px; text-align: center; }
        .weather-day .day-name { font-size: 12px; font-weight: 600; }

        .weather-day .day-temp { font-size: 14px; font-weight: 600; }

        .quote-box .quote-text { font-size: 14px; font-style: italic; color: var(--gold); }
        .quote-box .quote-author { font-size: 11px; color: var(--muted); margin-top: 3px; }

        footer { text-align: center; padding: 30px 20px 20px; color: var(--muted2); font-size: 11px; border-top: 1px solid var(--border); margin-top: 10px; }

            .weather-3day { grid-template-columns: repeat(3,1fr); gap: 5px; }
            .weather-main { flex-direction: column; text-align: center; }
        }
    </style>
</head>

        if (sec.tags) { html += '<div class="topic-tags">'; for (const t of sec.tags) html += '<span>#'+t+'</span>'; html += '</div>'; }
        for (let i=0;i<sec.items.length;i++) {
            const item = sec.items[i];
            const url = item.url ? item.url : '#';

// ====== Forex ======
async function loadForex() {
    const el = document.getElementById("fxGrid");
    if (!el) return;
    try {
        const baseRes = await fetch('https://api.exchangerate-api.com/v4/latest/CNY');
        if (baseRes.ok) {
            const data = await baseRes.json();
            const rates = data.rates;
            let h = "";
            for (const f of fxPairs) {
                if (f.from && f.to && rates[f.from]) {
                    // For pairs ending with CNY: show how much foreign = 1 CNY
                    let rate, delta, dCls;
                    if (f.to === "CNY") {
                        rate = (1 / rates[f.from]).toFixed(4);
                        delta = "--";
                        dCls = "flat";
                    }
                    h += '<div class="fx-item"><div class="pair">'+f.pair+'</div><div class="rate">'+rate+'</div><div class="delta '+dCls+'">'+delta+'</div></div>';
                } else {
                    h += '<div class="fx-item"><div class="pair">'+f.pair+'</div><div class="rate">--</div><div class="delta flat">--</div></div>';
                }
            }
            el.innerHTML = h;
        }
    } catch(e) {}
}
