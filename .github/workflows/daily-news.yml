name: Daily News Update

on:
  schedule:
    - cron: '0 6,8,10,12,14,16,18,20,22,0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Python collector
        run: timeout 150 python3 .github/scripts/fetch_news.py || echo 'COLLECT_FAILED'

      - name: RSS collector
        run: timeout 120 python3 .github/scripts/fetch_rss.py || echo 'RSS_FAILED'

      - name: Vertical collector
        run: timeout 90 python3 .github/scripts/fetch_more.py || echo 'MORE_FAILED'

      - name: Shop collector
        run: timeout 60 python3 .github/scripts/fetch_shop.py || echo 'SHOP_FAILED'

      - name: Metal & Volume
        run: timeout 30 python3 .github/scripts/fetch_metal_vol.py || echo 'MV_FAILED'

      - name: Quant picker
        run: node .github/scripts/fetch_quant.js || echo 'QUANT_FAILED'

      - name: Merge
        run: python3 .github/scripts/merge_news.py

      - name: Build page
        shell: bash
        run: |
          mkdir -p _site
          python3 .github/scripts/generate_site.py 2>&1

      - name: .nojekyll
        run: touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - id: deployment
        uses: actions/deploy-pages@v4
