name: Daily News Update

on:
  schedule:
    - cron: '0 0,4,10,14 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Python news collector
        run: |
          timeout 180 python3 .github/scripts/fetch_news.py || (python3 -c 'import json; json.dump({"news":[],"labels":[],"stocks":[],"forex":{}},open("news_data.json","w"))' && echo 'FETCH_EMPTY: created fallback news_data.json')

      - name: Python page builder
        working-directory: ./
        run: python3 .github/scripts/generate_site.py

      - name: Create .nojekyll
        run: touch .nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
