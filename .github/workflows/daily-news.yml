name: Daily News Update

on:
  schedule:
    - cron: '0 6,8,10,12,14,16,18,20,22,0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Python news collector (main sources)
        run: timeout 150 python3 .github/scripts/fetch_news.py || echo 'MAIN_COLLECTOR_FAILED'

      - name: RSS collector (international sources)
        run: timeout 120 python3 .github/scripts/fetch_rss.py || echo 'RSS_COLLECTOR_FAILED'

      - name: Vertical collector (Zhihu/Douban/GitHub/sspai)
        run: timeout 120 python3 .github/scripts/fetch_more.py || echo 'MORE_COLLECTOR_FAILED'

      - name: Merge all collectors
        run: python3 .github/scripts/merge_news.py

      - name: Python page builder
        working-directory: ./
        run: python3 .github/scripts/generate_site.py

      - name: Deploy to gh-pages branch
        run: |
          git config user.name "daily-news-bot"
          git config user.email "bot@example.com"
          git add index.html -f
          git stash --include-untracked -- .github/ || true
          git stash drop || true
          if git show-ref --quiet refs/heads/gh-pages; then
            git checkout gh-pages
            git checkout main -- index.html
          else
            git checkout --orphan gh-pages
            git rm -rf .
            git checkout main -- index.html
          fi
          git commit -m "auto deploy $(date -u +'%Y-%m-%d %H:%M UTC')" || true
          git push origin gh-pages --force
